<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Parqo — Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8f8fc;
        color: #17182e;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        text-align: center;
        padding: 24px;
      }
      .card {
        background: #fff;
        border: 1px solid #e7e7f0;
        border-radius: 28px;
        padding: 32px;
        max-width: 360px;
        box-shadow: 0 8px 30px rgba(23, 24, 46, 0.08);
      }
      h1 {
        font-size: 20px;
        margin: 0 0 8px;
      }
      p {
        color: #6e7187;
        font-size: 14px;
        line-height: 1.5;
      }
      .logo {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        background: #6754f4;
        color: #fff;
        display: grid;
        place-items: center;
        font-weight: 800;
        margin: 0 auto 16px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">P</div>
      <h1>Sei offline</h1>
      <p>
        Nessuna connessione al momento. I tuoi piani salvati restano disponibili sul dispositivo:
        riapri Parqo quando torni online.
      </p>
    </div>
  </body>
</html>
